name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject API Key
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 보안 경고: 클라이언트 사이드 HTML에 API Key를 직접 주입하는 것은 퍼블릭 레포지토리에서 키 유출 위험이 있습니다.
          # 이 방식은 접근이 제한된 인트라넷 환경이나 비공개 레포지토리 기반 Private GitHub Pages 단위에서만 사용하는 것을 권장합니다.
          if [ ! -z "$OPENROUTER_API_KEY" ]; then
            sed -i "s/__OPENROUTER_API_KEY__/${OPENROUTER_API_KEY}/g" index.html
          fi
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
